<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify — Start your free trial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --shopify-green:#95BF47;
  --shopify-dark-green:#5E8E3E;
  --black:#000;
  --white:#fff;
  --gray-50:#fafaf8;
  --gray-100:#f3f3ef;
  --gray-200:#e3e3dd;
  --gray-400:#8a8a80;
  --gray-600:#5c5c52;
  --gray-800:#2a2a24;
  --radius:16px;
  --radius-sm:10px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:var(--white);color:var(--gray-800)}

/* ── GLOBAL NAV ── */
.nav{
  position:sticky;top:0;z-index:200;
  height:64px;display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--gray-200);
}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:22px;letter-spacing:-.5px;cursor:pointer}
.nav-logo svg{height:32px}
.nav-links{display:flex;gap:28px}
.nav-links a{font-size:14px;font-weight:500;color:var(--gray-600);text-decoration:none;transition:color .15s}
.nav-links a:hover{color:var(--black)}
.nav-cta{
  background:var(--black);color:var(--white);
  padding:10px 22px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;border:none;cursor:pointer;
  text-decoration:none;transition:background .15s;
}
.nav-cta:hover{background:#333}

/* ── DIRECTORY PAGE ── */
.directory{display:none;min-height:100vh}
.directory.active{display:block}

.dir-hero{
  padding:100px 48px 80px;text-align:center;
  background:linear-gradient(180deg,var(--gray-50) 0%,var(--white) 100%);
}
.dir-hero h1{
  font-size:56px;font-weight:700;line-height:1.1;
  letter-spacing:-2px;max-width:700px;margin:0 auto 16px;
}
.dir-hero p{font-size:18px;color:var(--gray-600);max-width:520px;margin:0 auto}
.dir-badge{
  display:inline-block;margin-bottom:24px;
  font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--shopify-dark-green);background:#eef5e6;
  padding:6px 14px;border-radius:20px;
}

.dir-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:20px;padding:0 48px 100px;max-width:1200px;margin:0 auto;
}
.dir-card{
  background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;
  text-decoration:none;color:inherit;display:block;
}
.dir-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.08)}

.dir-card-top{
  padding:28px 28px 0;display:flex;gap:8px;flex-wrap:wrap;
}
.tag{
  display:inline-block;font-size:11px;font-weight:700;letter-spacing:.4px;
  text-transform:uppercase;padding:4px 10px;border-radius:20px;
}
.tag-creator{background:#f0e6ff;color:#6b21a8}
.tag-brand{background:#e0f2fe;color:#0369a1}
.tag-none{background:#fef3c7;color:#92400e}
.tag-pattern{background:#eef5e6;color:#3d6b22}

.dir-card-body{padding:20px 28px 28px}
.dir-card-headline{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:10px;letter-spacing:-.3px}
.dir-card-slug{
  font-size:13px;color:var(--shopify-dark-green);font-weight:600;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;
}
.dir-card-slug::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--shopify-green)}
.dir-card-meta{font-size:13px;color:var(--gray-400);line-height:1.5}
.dir-card-chars{
  position:absolute;top:16px;right:16px;
  font-size:11px;font-weight:600;color:var(--gray-400);
  background:var(--gray-100);padding:3px 8px;border-radius:6px;
}
.dir-card{position:relative}

/* ── LANDING PAGE ── */
.lp-page{display:none;min-height:100vh}
.lp-page.active{display:block}

.lp-hero-section{
  min-height:70vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:120px 48px 80px;text-align:center;position:relative;overflow:hidden;
}
.lp-hero-section::before{
  content:'';position:absolute;
  top:-200px;left:50%;transform:translateX(-50%);
  width:1200px;height:1200px;border-radius:50%;
  background:radial-gradient(circle,rgba(149,191,71,.06) 0%,transparent 60%);
  pointer-events:none;
}

.lp-headline{
  font-size:clamp(36px,5vw,64px);font-weight:700;
  line-height:1.08;letter-spacing:-2px;
  max-width:780px;margin:0 auto 40px;
  position:relative;
}

.lp-email-form{
  display:flex;gap:0;max-width:520px;width:100%;margin:0 auto 16px;
}
.lp-email-input{
  flex:1;padding:16px 20px;
  border:2px solid var(--gray-200);border-right:none;
  border-radius:var(--radius-sm) 0 0 var(--radius-sm);
  font-size:15px;font-family:inherit;outline:none;
  transition:border-color .15s;
}
.lp-email-input:focus{border-color:var(--gray-400)}
.lp-email-input::placeholder{color:var(--gray-400)}
.lp-email-btn{
  padding:16px 28px;
  background:var(--black);color:var(--white);border:none;
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;white-space:nowrap;transition:background .15s;
}
.lp-email-btn:hover{background:#333}
.lp-trial-note{font-size:13px;color:var(--gray-400);margin-bottom:0}

/* ── SOCIAL PROOF ── */
.lp-social-proof{
  padding:48px;text-align:center;
  background:var(--gray-50);border-top:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200);
}
.lp-social-proof p{font-size:14px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;margin-bottom:20px}
.lp-logos{display:flex;align-items:center;justify-content:center;gap:48px;flex-wrap:wrap;opacity:.4}
.lp-logos span{font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--black)}

/* ── FEATURES ── */
.lp-features{
  padding:100px 48px;max-width:1100px;margin:0 auto;
}
.lp-features h2{
  font-size:36px;font-weight:700;letter-spacing:-1px;text-align:center;margin-bottom:60px;
}
.lp-feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px}
.lp-feature-card{text-align:center;padding:32px 20px}
.lp-feature-icon{
  width:56px;height:56px;border-radius:14px;
  background:var(--gray-100);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:24px;
}
.lp-feature-card h3{font-size:16px;font-weight:700;margin-bottom:8px;letter-spacing:-.2px}
.lp-feature-card p{font-size:14px;color:var(--gray-600);line-height:1.6}

/* ── FAQ ── */
.lp-faq-section{
  padding:80px 48px;
  background:var(--gray-50);border-top:1px solid var(--gray-200);
}
.lp-faq-inner{max-width:680px;margin:0 auto}
.lp-faq-section h2{
  font-size:32px;font-weight:700;letter-spacing:-1px;margin-bottom:40px;text-align:center;
}
.faq-item{border-bottom:1px solid var(--gray-200)}
.faq-q{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 0;cursor:pointer;
  font-size:16px;font-weight:600;line-height:1.4;
}
.faq-q .faq-icon{
  width:28px;height:28px;border-radius:50%;
  background:var(--gray-200);display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--gray-600);flex-shrink:0;margin-left:16px;
  transition:transform .25s,background .15s;
}
.faq-item.open .faq-icon{transform:rotate(45deg);background:var(--black);color:var(--white)}
.faq-a{
  max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;
  font-size:15px;color:var(--gray-600);line-height:1.7;
}
.faq-item.open .faq-a{max-height:200px;padding-bottom:20px}

/* ── BOTTOM CTA ── */
.lp-bottom-cta{
  padding:100px 48px;text-align:center;
  background:var(--black);color:var(--white);
}
.lp-bottom-cta h2{font-size:40px;font-weight:700;letter-spacing:-1.5px;margin-bottom:12px}
.lp-bottom-cta p{font-size:16px;color:rgba(255,255,255,.5);margin-bottom:36px}
.lp-bottom-cta .lp-email-form{margin:0 auto}
.lp-bottom-cta .lp-email-input{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15);color:var(--white)}
.lp-bottom-cta .lp-email-input::placeholder{color:rgba(255,255,255,.35)}
.lp-bottom-cta .lp-email-btn{background:var(--shopify-green);color:var(--black)}
.lp-bottom-cta .lp-email-btn:hover{background:var(--shopify-dark-green);color:var(--white)}
.lp-bottom-cta .lp-trial-note{color:rgba(255,255,255,.35)}

/* ── FOOTER ── */
.footer{
  padding:40px 48px;text-align:center;
  font-size:13px;color:var(--gray-400);
  border-top:1px solid var(--gray-200);
}

/* ── DEV TOOLBAR ── */
.dev-toolbar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(0,0,0,.92);backdrop-filter:blur(12px);
  padding:12px 24px;display:flex;align-items:center;gap:16px;
  color:rgba(255,255,255,.7);font-size:13px;
}
.dev-toolbar .dt-label{font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;font-size:11px;letter-spacing:.5px}
.dev-toolbar .dt-slug{color:var(--shopify-green);font-weight:600}
.dev-toolbar .dt-chars{color:rgba(255,255,255,.5)}
.dev-toolbar .dt-tier{
  padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.3px;
}
.dev-toolbar .dt-tier.creator{background:rgba(168,85,247,.2);color:#c084fc}
.dev-toolbar .dt-tier.brand{background:rgba(56,189,248,.2);color:#38bdf8}
.dev-toolbar .dt-tier.none{background:rgba(251,191,36,.2);color:#fbbf24}
.dt-nav{margin-left:auto;display:flex;gap:8px}
.dt-nav button{
  background:rgba(255,255,255,.1);border:none;color:var(--white);
  padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:background .15s;
}
.dt-nav button:hover{background:rgba(255,255,255,.2)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .nav{padding:0 20px}
  .nav-links{display:none}
  .dir-hero{padding:60px 20px 48px}
  .dir-hero h1{font-size:36px}
  .dir-grid{grid-template-columns:1fr;padding:0 20px 60px}
  .lp-hero-section{padding:80px 20px 60px}
  .lp-email-form{flex-direction:column;gap:10px}
  .lp-email-input{border-right:2px solid var(--gray-200);border-radius:var(--radius-sm)}
  .lp-email-btn{border-radius:var(--radius-sm)}
  .lp-feature-grid{grid-template-columns:1fr}
  .lp-features,.lp-faq-section,.lp-bottom-cta{padding:60px 20px}
  .dev-toolbar{flex-wrap:wrap;gap:8px;padding:10px 16px}
  .dt-nav{margin-left:0;width:100%}
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.dir-card{animation:fadeUp .5s ease both}
.dir-card:nth-child(1){animation-delay:.05s}
.dir-card:nth-child(2){animation-delay:.1s}
.dir-card:nth-child(3){animation-delay:.15s}
.dir-card:nth-child(4){animation-delay:.2s}
.dir-card:nth-child(5){animation-delay:.25s}
.dir-card:nth-child(6){animation-delay:.3s}
.dir-card:nth-child(7){animation-delay:.35s}
.dir-card:nth-child(8){animation-delay:.4s}
</style>
</head>

let currentIdx = -1;

function goHome() {
  currentIdx = -1;
  document.getElementById('page-directory').classList.add('active');
  document.querySelectorAll('.lp-page').forEach(p => p.classList.remove('active'));
  document.getElementById('dev-toolbar').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.pushState(null, '', '#');
}

function showVariant(idx) {
  currentIdx = idx;
  const v = VARIANTS[idx];

  document.getElementById('page-directory').classList.remove('active');
  document.querySelectorAll('.lp-page').forEach(p => p.classList.remove('active'));

  let page = document.getElementById('lp-' + v.slug);
  if (!page) {
    page = document.createElement('div');
    page.id = 'lp-' + v.slug;
    page.className = 'lp-page';
    page.innerHTML = renderLP(v);
    document.getElementById('lp-mount').appendChild(page);
  }
  page.classList.add('active');

  const tb = document.getElementById('dev-toolbar');
  tb.style.display = 'flex';
  document.getElementById('dt-slug').textContent = '/free-trial/' + v.slug;
  document.getElementById('dt-chars').textContent = v.chars + ' chars';
  const tierEl = document.getElementById('dt-tier');
  tierEl.textContent = v.tierLabel;
  tierEl.className = 'dt-tier ' + v.tier;

  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.pushState(null, '', '#/free-trial/' + v.slug);
}

function prevVariant() { showVariant((currentIdx - 1 + VARIANTS.length) % VARIANTS.length); }
function nextVariant() { showVariant((currentIdx + 1) % VARIANTS.length); }

function renderLP(v) {
  return `
    <section class="lp-hero-section">
      <h1 class="lp-headline">${v.headline}</h1>
      <div class="lp-email-form">
        <input class="lp-email-input" type="email" placeholder="Enter your email address">
        <button class="lp-email-btn">Start free trial</button>
      </div>
      <p class="lp-trial-note">Try Shopify free — no credit card required</p>
    </section>

    <div class="lp-social-proof">
      <p>Trusted by millions of businesses worldwide</p>
      <div class="lp-logos">
        <span>Allbirds</span><span>Gymshark</span><span>Heinz</span><span>FIGS</span><span>Bombas</span>
      </div>
    </div>

    <section class="lp-features">
      <h2>Everything to start, sell, and grow</h2>
      <div class="lp-feature-grid">
        ${v.features.map(f => `
          <div class="lp-feature-card">
            <div class="lp-feature-icon">${f.icon}</div>
            <h3>${f.title}</h3>
            <p>${f.desc}</p>
          </div>
        `).join('')}
      </div>
    </section>

    <section class="lp-faq-section">
      <h2>Frequently asked questions</h2>
      <div class="lp-faq-inner">
        <div class="faq-item open">
          <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
            ${v.faqQ}
            <span class="faq-icon">+</span>
          </div>
          <div class="faq-a">${v.faqA}</div>
        </div>
        <div class="faq-item">
          <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
            What happens after my trial ends?
            <span class="faq-icon">+</span>
          </div>
          <div class="faq-a">You'll pick a plan that fits your business. Plans start at $5/month, and you can change or cancel anytime.</div>
        </div>
        <div class="faq-item">
          <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
            Do I need technical skills to use Shopify?
            <span class="faq-icon">+</span>
          </div>
          <div class="faq-a">Not at all. Shopify is designed so anyone can build a professional store — drag, drop, and publish. No coding required.</div>
        </div>
        <div class="faq-item">
          <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">
            Can I use my own domain name?
            <span class="faq-icon">+</span>
          </div>
          <div class="faq-a">Yes. Connect a domain you already own or buy a new one directly through Shopify. Setup takes just a few clicks.</div>
        </div>
      </div>
    </section>

    <section class="lp-bottom-cta">
      <h2>Start building today</h2>
      <p>Join millions of entrepreneurs on Shopify</p>
      <div class="lp-email-form">
        <input class="lp-email-input" type="email" placeholder="Enter your email address">
        <button class="lp-email-btn">Start free trial</button>
      </div>
      <p class="lp-trial-note" style="margin-top:14px">No credit card required</p>
    </section>
  `;
}

function renderDirectory() {
  const grid = document.getElementById('dir-grid');
  grid.innerHTML = VARIANTS.map((v, i) => `
    <a class="dir-card" onclick="showVariant(${i})">
      <span class="dir-card-chars">${v.chars} chars</span>
      <div class="dir-card-top">
        <span class="tag tag-${v.tier}">${v.tierLabel}</span>
        <span class="tag tag-pattern">${v.pattern}</span>
      </div>
      <div class="dir-card-body">
        <div class="dir-card-headline">${v.headline}</div>
        <div class="dir-card-slug">/free-trial/${v.slug}</div>
        <div class="dir-card-meta"><strong>Ad:</strong> ${v.adRef}</div>
      </div>
    </a>
  `).join('');
}

window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#', '');
  if (hash.startsWith('/free-trial/')) {
    const slug = hash.replace('/free-trial/', '');
    const idx = VARIANTS.findIndex(v => v.slug === slug);
    if (idx >= 0) showVariant(idx);
  } else {
    goHome();
  }
});

window.addEventListener('keydown', (e) => {
  if (currentIdx < 0) return;
  if (e.key === 'ArrowLeft') prevVariant();
  if (e.key === 'ArrowRight') nextVariant();
  if (e.key === 'Escape') goHome();
});

renderDirectory();

const initHash = location.hash.replace('#', '');
if (initHash.startsWith('/free-trial/')) {
  const slug = initHash.replace('/free-trial/', '');
  const idx = VARIANTS.findIndex(v => v.slug === slug);
  if (idx >= 0) showVariant(idx);
}
</script>
