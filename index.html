<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify — Start your free trial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#000;--white:#fff;
  --shopify-green:#95BF47;--shopify-dark-green:#5E8E3E;
  --gray-50:#fafaf8;--gray-100:#f3f3ef;--gray-200:#e3e3dd;--gray-300:#d1d1c7;
  --gray-400:#8a8a80;--gray-600:#5c5c52;--gray-800:#2a2a24;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:var(--white);color:var(--gray-800)}

/* ── DIRECTORY ── */
.directory{display:none;min-height:100vh}.directory.active{display:block}
.dir-topbar{
  position:sticky;top:0;z-index:100;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--gray-200);
}
.dir-topbar-logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.dir-topbar-logo svg{height:28px}
.dir-topbar-logo span{font-weight:700;font-size:15px;letter-spacing:-.3px}
.dir-topbar-meta{font-size:12px;color:var(--gray-400);display:flex;align-items:center;gap:10px}
.dir-topbar-meta .pill{background:#eef5e6;color:var(--shopify-dark-green);padding:4px 10px;border-radius:12px;font-weight:700;font-size:10px;letter-spacing:.5px;text-transform:uppercase}
.dir-hero{padding:80px 32px 56px;text-align:center;background:linear-gradient(180deg,var(--gray-50),var(--white))}
.dir-hero h1{font-size:48px;font-weight:800;line-height:1.08;letter-spacing:-2px;max-width:640px;margin:0 auto 14px}
.dir-hero p{font-size:16px;color:var(--gray-600);max-width:480px;margin:0 auto}
.dir-badge{display:inline-block;margin-bottom:20px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--shopify-dark-green);background:#eef5e6;padding:5px 12px;border-radius:16px}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:0 32px 80px;max-width:1200px;margin:0 auto}
.dir-card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;text-decoration:none;color:inherit;display:block;position:relative}
.dir-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.dir-card-top{padding:24px 24px 0;display:flex;gap:6px;flex-wrap:wrap}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 8px;border-radius:12px}
.tag-creator{background:#f0e6ff;color:#6b21a8}.tag-brand{background:#e0f2fe;color:#0369a1}.tag-none{background:#fef3c7;color:#92400e}.tag-pattern{background:#eef5e6;color:#3d6b22}
.dir-card-body{padding:16px 24px 24px}
.dir-card-headline{font-size:18px;font-weight:700;line-height:1.3;margin-bottom:8px;letter-spacing:-.3px}
.dir-card-slug{font-size:12px;color:var(--shopify-dark-green);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.dir-card-slug::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--shopify-green)}
.dir-card-meta{font-size:12px;color:var(--gray-400);line-height:1.5}
.dir-card-chars{position:absolute;top:14px;right:14px;font-size:10px;font-weight:600;color:var(--gray-400);background:var(--gray-100);padding:2px 7px;border-radius:5px}

/* ── LP PAGE ── */
.lp-page{display:none;min-height:100vh}.lp-page.active{display:block}

/* Hero */
.lp-hero{
  position:relative;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;background:#1a1a1a;
}
.lp-hero-bg{
  position:absolute;inset:0;z-index:1;
  background-image:url('https://cdn.shopify.com/b/shopify-brochure2-assets/f81302420e068442662747e73daeb4a0.webp?width=2000');
  background-size:cover;background-position:center;
}

/* Shopify logo */
.lp-logo{
  position:absolute;top:24px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;align-items:center;gap:8px;
}
.lp-logo img{height:36px}

/* Two-card stack */
.lp-cards{
  position:relative;z-index:5;
  display:flex;flex-direction:column;
  max-width:520px;width:90%;
}

/* White headline card */
.lp-white-card{
  background:var(--white);
  border-radius:20px 20px 0 0;
  padding:40px 40px 32px;
}
.lp-white-card h1{
  font-size:36px;font-weight:800;
  line-height:1.1;letter-spacing:-1.2px;
  margin-bottom:14px;color:var(--black);
}
.lp-white-card p{
  font-size:14px;color:var(--gray-600);line-height:1.55;
}

/* Dark CTA card */
.lp-dark-card{
  background:var(--black);
  border-radius:0 0 20px 20px;
  padding:28px 40px 36px;
  color:var(--white);
}
.lp-dark-card-title{
  font-size:18px;font-weight:700;margin-bottom:4px;
}
.lp-dark-card-sub{
  font-size:14px;color:rgba(255,255,255,.55);margin-bottom:10px;
}
.lp-dark-card-consent{
  font-size:11px;color:rgba(255,255,255,.4);margin-bottom:14px;font-style:italic;
}
.lp-pill-form{
  display:flex;align-items:center;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.15);
  border-radius:60px;
  padding:5px 5px 5px 20px;gap:8px;
}
.lp-pill-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--white);font-size:15px;font-family:inherit;padding:10px 0;
}
.lp-pill-input::placeholder{color:rgba(255,255,255,.4)}
.lp-pill-submit{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.15);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.lp-pill-submit:hover{background:rgba(255,255,255,.25)}
.lp-pill-submit svg{width:18px;height:18px}

/* Brand logos bar */
.lp-brands{
  padding:32px 48px;
  display:flex;align-items:center;justify-content:center;gap:32px;
  flex-wrap:wrap;background:var(--white);
  border-bottom:1px solid var(--gray-200);
}
.lp-brands img{height:24px;opacity:.4;transition:opacity .2s}
.lp-brands img:hover{opacity:.7}

/* Features */
.lp-sections{max-width:1100px;margin:0 auto;padding:80px 48px}
.lp-sections-header{text-align:center;margin-bottom:56px}
.lp-sections-header h2{font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.lp-sections-header p{font-size:16px;color:var(--gray-600)}
.lp-feature-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.lp-feature-card{background:var(--gray-50);border-radius:16px;padding:36px 28px;border:1px solid var(--gray-200);transition:border-color .2s}
.lp-feature-card:hover{border-color:var(--gray-300)}
.lp-feature-icon{width:48px;height:48px;border-radius:12px;background:var(--white);border:1px solid var(--gray-200);display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:22px}
.lp-feature-card h3{font-size:16px;font-weight:700;margin-bottom:8px;letter-spacing:-.2px}
.lp-feature-card p{font-size:14px;color:var(--gray-600);line-height:1.6}

/* Testimonial */
.lp-testimonial{padding:64px 48px;background:var(--gray-50);border-top:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200)}
.lp-testimonial-inner{max-width:700px;margin:0 auto;text-align:center}
.lp-testimonial blockquote{font-size:22px;font-weight:500;line-height:1.5;letter-spacing:-.3px;margin-bottom:20px;font-style:italic;color:var(--gray-800)}
.lp-testimonial cite{font-size:14px;color:var(--gray-400);font-style:normal;font-weight:600}

/* FAQ */
.lp-faq{padding:80px 48px;max-width:760px;margin:0 auto}
.lp-faq h2{font-size:28px;font-weight:800;letter-spacing:-.8px;margin-bottom:36px}
.faq-item{border-bottom:1px solid var(--gray-200)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:20px 0;cursor:pointer;font-size:16px;font-weight:600;line-height:1.4}
.faq-q .faq-chevron{width:24px;height:24px;flex-shrink:0;margin-left:16px;transition:transform .25s;color:var(--gray-400)}
.faq-item.open .faq-chevron{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;font-size:15px;color:var(--gray-600);line-height:1.7}
.faq-item.open .faq-a{max-height:300px;padding-bottom:20px}

/* Bottom CTA */
.lp-bottom{padding:80px 48px;text-align:center;background:var(--gray-50);border-top:1px solid var(--gray-200)}
.lp-bottom-inner{max-width:480px;margin:0 auto}
.lp-bottom h2{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.lp-bottom p{font-size:15px;color:var(--gray-600);margin-bottom:24px}
.lp-bottom .lp-pill-form{max-width:420px;margin:0 auto;background:var(--black);border-color:transparent}
.lp-bottom .lp-pill-input{color:var(--white)}
.lp-bottom .lp-pill-input::placeholder{color:rgba(255,255,255,.4)}
.lp-bottom-consent{font-size:11px;color:var(--gray-400);margin-top:12px;text-align:center;font-style:italic}

/* Footer */
.footer{padding:32px 48px;text-align:center;font-size:12px;color:var(--gray-400);border-top:1px solid var(--gray-200)}

/* Dev toolbar */
.dev-toolbar{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(0,0,0,.94);backdrop-filter:blur(12px);
  padding:10px 20px;display:flex;align-items:center;gap:14px;
  color:rgba(255,255,255,.7);font-size:12px;
}
.dt-label{font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;font-size:10px;letter-spacing:.5px}
.dt-slug{color:var(--shopify-green);font-weight:600}
.dt-chars{color:rgba(255,255,255,.4)}
.dt-tier{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.dt-tier.creator{background:rgba(168,85,247,.2);color:#c084fc}
.dt-tier.brand{background:rgba(56,189,248,.2);color:#38bdf8}
.dt-tier.none{background:rgba(251,191,36,.2);color:#fbbf24}
.dt-nav{margin-left:auto;display:flex;gap:6px}
.dt-nav button{background:rgba(255,255,255,.1);border:none;color:var(--white);padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.dt-nav button:hover{background:rgba(255,255,255,.2)}

/* Responsive */
@media(max-width:768px){
  .dir-topbar{padding:0 16px}.dir-topbar-meta{display:none}
  .dir-hero{padding:48px 16px 40px}.dir-hero h1{font-size:32px}
  .dir-grid{grid-template-columns:1fr;padding:0 16px 60px}
  .lp-white-card{padding:28px 24px 20px}.lp-white-card h1{font-size:26px}
  .lp-dark-card{padding:20px 24px 28px}
  .lp-feature-grid{grid-template-columns:1fr}
  .lp-sections,.lp-faq,.lp-bottom,.lp-testimonial{padding:48px 20px}
  .lp-brands{padding:20px 16px;gap:20px}
  .dev-toolbar{flex-wrap:wrap;gap:6px;padding:8px 12px}
  .dt-nav{margin-left:0;width:100%}
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:scale(.96) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
.dir-card{animation:fadeUp .5s ease both}
.dir-card:nth-child(1){animation-delay:.05s}.dir-card:nth-child(2){animation-delay:.1s}
.dir-card:nth-child(3){animation-delay:.15s}.dir-card:nth-child(4){animation-delay:.2s}
.dir-card:nth-child(5){animation-delay:.25s}.dir-card:nth-child(6){animation-delay:.3s}
.dir-card:nth-child(7){animation-delay:.35s}.dir-card:nth-child(8){animation-delay:.4s}
.lp-cards{animation:cardIn .6s cubic-bezier(.16,1,.3,1) both}
</style>
</head>

let currentIdx = -1;

function goHome() {
  currentIdx = -1;
  document.getElementById('page-directory').classList.add('active');
  document.querySelectorAll('.lp-page').forEach(p => p.classList.remove('active'));
  document.getElementById('dev-toolbar').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.pushState(null, '', '#');
}

function showVariant(idx) {
  currentIdx = idx;
  const v = VARIANTS[idx];
  document.getElementById('page-directory').classList.remove('active');
  document.querySelectorAll('.lp-page').forEach(p => p.classList.remove('active'));
  let page = document.getElementById('lp-' + v.slug);
  if (!page) {
    page = document.createElement('div');
    page.id = 'lp-' + v.slug;
    page.className = 'lp-page';
    page.innerHTML = renderLP(v);
    document.getElementById('lp-mount').appendChild(page);
  }
  page.classList.add('active');
  const tb = document.getElementById('dev-toolbar');
  tb.style.display = 'flex';
  document.getElementById('dt-slug').textContent = '/free-trial/' + v.slug;
  document.getElementById('dt-chars').textContent = v.chars + ' chars';
  const tierEl = document.getElementById('dt-tier');
  tierEl.textContent = v.tierLabel;
  tierEl.className = 'dt-tier ' + v.tier;
  window.scrollTo({ top: 0 });
  history.pushState(null, '', '#/free-trial/' + v.slug);
}

function prevVariant() { showVariant((currentIdx - 1 + VARIANTS.length) % VARIANTS.length); }
function nextVariant() { showVariant((currentIdx + 1) % VARIANTS.length); }

function renderLP(v) {
  return `
    <section class="lp-hero">
      <div class="lp-hero-bg"></div>
      <div class="lp-logo">
        <img src="${SHOPIFY_LOGO}" alt="Shopify">
      </div>
      <div class="lp-cards">
        <div class="lp-white-card">
          <h1>${v.headline}</h1>
          <p>${v.desc}</p>
        </div>
        <div class="lp-dark-card">
          <div class="lp-dark-card-title">Get your first 3 months free</div>
          <div class="lp-dark-card-sub">Plus, earn up to $10,000 in Launch Rewards.</div>
          <div class="lp-dark-card-consent">You agree to receive marketing emails.</div>
          <div class="lp-pill-form">
            <input class="lp-pill-input" type="email" placeholder="Enter your email address">
            <button class="lp-pill-submit">${ARROW_SVG}</button>
          </div>
        </div>
      </div>
    </section>

    <div class="lp-brands">
      ${BRAND_LOGOS.map(l => `<img src="${l}" alt="Brand logo">`).join('')}
    </div>

    <section class="lp-sections">
      <div class="lp-sections-header">
        <h2>Everything to start, sell, and grow</h2>
        <p>Tools for every stage of your business</p>
      </div>
      <div class="lp-feature-grid">
        ${v.features.map(f => `
          <div class="lp-feature-card">
            <div class="lp-feature-icon">${f.icon}</div>
            <h3>${f.title}</h3>
            <p>${f.desc}</p>
          </div>
        `).join('')}
      </div>
    </section>

    <div class="lp-testimonial">
      <div class="lp-testimonial-inner">
        <blockquote>\u201CWe\u2019ve tripled in size since we first started on Shopify. It gives us the tools we need to keep pushing forward.\u201D</blockquote>
        <cite>Clare Jerome, NEOM Wellbeing</cite>
      </div>
    </div>

    <section class="lp-faq">
      <h2>Questions?</h2>
      <div class="faq-item open">
        <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">${v.faqQ}${CHEVRON_SVG}</div>
        <div class="faq-a">${v.faqA}</div>
      </div>
      <div class="faq-item">
        <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">What is Shopify and how does it work?${CHEVRON_SVG}</div>
        <div class="faq-a">Shopify is a complete commerce platform that lets you start, grow, and manage a business. Create an online store, sell across social media and marketplaces, and manage everything from one dashboard.</div>
      </div>
      <div class="faq-item">
        <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">How much does Shopify cost?${CHEVRON_SVG}</div>
        <div class="faq-a">Try Shopify free for 3 days, no credit card required. After your trial, choose a plan that suits the size and stage of your business.</div>
      </div>
      <div class="faq-item">
        <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">Can I use my own domain name with Shopify?${CHEVRON_SVG}</div>
        <div class="faq-a">Yes. Connect a domain you already own or buy a new one through Shopify. Setup takes just a few clicks from your admin.</div>
      </div>
      <div class="faq-item">
        <div class="faq-q" onclick="this.parentElement.classList.toggle('open')">Do I need to be a designer or developer to use Shopify?${CHEVRON_SVG}</div>
        <div class="faq-a">No. Shopify is designed so anyone can build a professional store \u2014 customize themes, add apps, and launch without writing a single line of code.</div>
      </div>
    </section>

    <section class="lp-bottom">
      <div class="lp-bottom-inner">
        <h2>No risk, all rewards</h2>
        <p>Try Shopify free. Plus, earn up to $10,000 in credits as you sell.</p>
        <div class="lp-pill-form">
          <input class="lp-pill-input" type="email" placeholder="Enter your email address">
          <button class="lp-pill-submit">${ARROW_SVG}</button>
        </div>
        <div class="lp-bottom-consent">You agree to receive marketing emails.</div>
      </div>
    </section>
  `;
}

function renderDirectory() {
  document.getElementById('dir-grid').innerHTML = VARIANTS.map((v, i) => `
    <a class="dir-card" onclick="showVariant(${i})">
      <span class="dir-card-chars">${v.chars} chars</span>
      <div class="dir-card-top">
        <span class="tag tag-${v.tier}">${v.tierLabel}</span>
        <span class="tag tag-pattern">${v.pattern}</span>
      </div>
      <div class="dir-card-body">
        <div class="dir-card-headline">${v.headline}</div>
        <div class="dir-card-slug">/free-trial/${v.slug}</div>
        <div class="dir-card-meta"><strong>Ad:</strong> ${v.adRef}</div>
      </div>
    </a>
  `).join('');
  document.getElementById('variant-count').textContent = VARIANTS.length + ' variants';
}

window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#', '');
  if (hash.startsWith('/free-trial/')) {
    const idx = VARIANTS.findIndex(v => v.slug === hash.replace('/free-trial/', ''));
    if (idx >= 0) showVariant(idx);
  } else goHome();
});

window.addEventListener('keydown', (e) => {
  if (currentIdx < 0) return;
  if (e.key === 'ArrowLeft') prevVariant();
  if (e.key === 'ArrowRight') nextVariant();
  if (e.key === 'Escape') goHome();
});

renderDirectory();
const initHash = location.hash.replace('#', '');
if (initHash.startsWith('/free-trial/')) {
  const idx = VARIANTS.findIndex(v => v.slug === initHash.replace('/free-trial/', ''));
  if (idx >= 0) showVariant(idx);
}
</script>
